name: Release

on:
  push:
    tags:
      - "release/*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: packmindhub/skillsight

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#release/}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match release/<x.y.z>"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Verify version sync across package.json files
        run: |
          for f in package.json backend/package.json frontend/package.json; do
            actual=$(jq -r .version "$f")
            if [[ "$actual" != "$VERSION" ]]; then
              echo "::error::$f version '$actual' != tag version '$VERSION'. Run 'bun run version:sync' and re-tag."
              exit 1
            fi
            echo "$f OK ($actual)"
          done

      - name: Extract release notes from Changelog.md
        run: |
          if [[ ! -f Changelog.md ]]; then
            echo "::error::Changelog.md is missing from the repo root"
            exit 1
          fi
          NOTES=$(awk -v ver="$VERSION" '
            $0 == "## " ver {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' Changelog.md | sed -e '/./,$!d' | sed -e ':a' -e '/^\n*$/{$d;N;ba' -e '}')
          if [[ -z "$NOTES" ]]; then
            echo "::error::No '## $VERSION' section found in Changelog.md"
            exit 1
          fi
          {
            echo "RELEASE_NOTES<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$VERSION" \
            --notes "$RELEASE_NOTES" \
            --verify-tag \
            --latest
